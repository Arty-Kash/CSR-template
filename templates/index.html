<!DOCTYPE html>
<html>
<head>
    <title>Simple App</title>
</head>
<body>

    <!-- 文字列とボタンを横並び（同じ高さ）にするための設定 -->
    <div style="display: flex; align-items: center;">
        <!-- データを表示するための場所 -->
        <div id="display"></div>
        <button id="toggleBtn" style="margin-left: 10px;">Stop</button>
    </div>

    <script>
        // ボタンの表示を切り替える処理
        const btn = document.getElementById('toggleBtn');

        let eventSource = null; // SSEの接続を管理するための変数


        // タイマー開始関数（SSE接続の開始）
        function startTimer() {
            if (!eventSource) {
                // 1. SSE接続を開始
                eventSource = new EventSource('/api/data');

                // 2. サーバーからメッセージが届いた時の処理
                eventSource.onmessage = function(event) {
                    // event.data にサーバーからの文字列が入っている
                    document.getElementById('display').innerText = event.data;
                };

                // エラー時の処理（接続が切れた場合など）
                eventSource.onerror = function() {
                    stopTimer();
                    btn.innerText = 'Start';
                };
            }
        }

        // タイマー停止関数（SSE接続の切断）
        function stopTimer() {
            if (eventSource) {
                eventSource.close(); // 接続を閉じる
                eventSource = null;
            }
        }

        btn.addEventListener('click', () => {
            if (btn.innerText === 'Stop') {
                stopTimer();
                btn.innerText = 'Start';
            } else {
                startTimer();
                btn.innerText = 'Stop';
            }
        });

        /*　Fetchの場合

        // データを取得して表示を更新する関数

                .then(response => response.json())  // サーバーから返ってきたデータをJSで使えるオブジェクト形式に変換
                .then(data => {
                    // 取得したデータの中にある message という文字列を、HTMLの display というIDを持つ要素の中に書き込み
                    document.getElementById('display').innerText = data.message;
                });
        }

        // タイマー開始関数
        function startTimer() {

            }
        }

        // タイマー停止関数
        function stopTimer() {
            clearInterval(timerId);
            timerId = null;
        }

        // ボタンクリック時のイベントリスナー

                // 2. 「Stop（止める）」ボタンが押されたら、停止して表示を「Start」に変える
                stopTimer();
                btn.innerText = 'Start';
            } else {
                // 3. 「Start（始める）」ボタンが押されたら、再開して表示を「Stop」に変える

            }
        });
        */

        // 1. ページ読み込み時に一度実行（最初の表示用）
